<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appasamy</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1f2a;
  color:white;
}

h1{
  text-align:center;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  color:black;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3{
  text-align:center;
}
</style>

</head>

<body>

<h1>Appasamy Devices</h1>

<div class="products">

  <div class="card">
    <img src="1F82EA27-3B7B-4E00-AFE7-D259D685A22D.png">
    <h3>Ultrasound</h3>
  </div>

  <div class="card">
    <img src="20B930E9-2ED3-46F8-AC99-D300194B7418.png">
    <h3>Operation Table</h3>
  </div>

  <div class="card">
    <img src="3A58C500-DEA0-4606-ABDC-1C161C990E0D.png">
    <h3>Lensometer</h3>
  </div>

  <div class="card">
    <img src="537E7AE0-A660-4979-B0CC-465619B5C7BC.png">
    <h3>Slit Lamp</h3>
  </div>

  <div class="card">
    <img src="6F8246E4-ED27-4A62-A161-A495B0768C62.png">
    <h3>Refraction Unit</h3>
  </div>

  <div class="card">
    <img src="910E550D-E20D-46C4-B9AD-C51C831EEF24.png">
    <h3>Imaging System</h3>
  </div>

  <div class="card">
    <img src="ABED7251-1A9A-4718-BDF7-DA9D2E557867.png">
    <h3>Microscope</h3>
  </div>

  <div class="card">
    <img src="CB8502E8-3E44-421F-AB56-B302C543CE1D.png">
    <h3>Fundus Camera</h3>
  </div>

</div>

</body>
</html>
