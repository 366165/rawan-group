<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APPASAMY Products</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#071521;
    color:white;
}

header{
    text-align:center;
    padding:40px;
    background:#0f2538;
}

h1{
    margin:0;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#0f2538;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    padding:10px;
}

.card p{
    padding:0 10px;
    color:#ccc;
}

.btn{
    display:block;
    margin:15px;
    padding:10px;
    background:#00c896;
    text-align:center;
    border-radius:6px;
    color:white;
    text-decoration:none;
}
</style>

</head>

<body>

<header>
    <h1>APPASAMY Devices</h1>
</header>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1581594693702-fbdc51b2763b">
        <h3>Slit Lamp</h3>
        <p>High precision ophthalmology device</p>
        <a class="btn" href="https://wa.me/218924173771">Order Now</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1579154204601-01588f351e67">
        <h3>Auto Refractometer</h3>
        <p>Advanced eye testing system</p>
        <a class="btn" href="https://wa.me/218924173771">Order Now</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
        <h3>Ophthalmic Chair</h3>
        <p>Comfortable and professional unit</p>
        <a class="btn" href="https://wa.me/218924173771">Order Now</a>
    </div>

</div>

</body>
</html>
