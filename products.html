<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APPASAMY Libya</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#071521;
    color:white;
}

/* HEADER */
header{
    padding:60px 20px;
    text-align:center;
    background:linear-gradient(135deg,#071521,#0f2538);
}

h1{
    margin:0;
    font-size:36px;
}

p{
    color:#ccc;
}

/* HERO IMAGE */
.hero{
    width:100%;
    max-height:400px;
    object-fit:cover;
}

/* PRODUCTS */
.products{

    gap:25px;
    padding:40px;
}

.card{
    background:#0f2538;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    padding:10px;
}

.card p{
    padding:0 10px 10px;
}

/* BUTTON */
.btn{
    display:block;
    margin:15px;
    padding:12px;
    background:#00c896;
    text-align:center;
    border-radius:6px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

/* BACK */
.back{
    display:inline-block;
    margin:20px;
    color:#00c896;
    text-decoration:none;
}
</style>

</head>
