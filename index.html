<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rawan Group</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1c2c;
  color:white;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#071521;
}

nav h1 {
  font-size:20px;
}

nav a {
  color:white;
  text-decoration:none;
  margin:0 10px;
}

/* HERO */
header {
  text-align:center;
  padding:60px 20px;
}

header img {
  width:100px;
  margin-bottom:20px;
}

header h2 {
  font-size:40px;
  margin:10px 0;
}

/* BUTTON */
.btn {
  background:#00c896;
  padding:10px 20px;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

/* PRODUCTS */
.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:40px;
}

.card {
  background:white;
  color:black;
  width:300px;
  margin:15px;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img {
  width:100%;
  border-radius:10px;
}

.card h3 {
  margin:15px 0 10px;
}

.card p {
  font-size:14px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#071521;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>Rawan Group</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">Products</a>

  </div>

  <!-- حط اسم اللوقو هنا -->
  <img src="IMG_5271.jpeg">

<!-- PRODUCTS -->
<section id="products" class="products">

    <img src="IMG_5271.jpeg">
    <h3>YAG Laser</h3>

<!-- FOOTER -->
<footer>
  <p>© Rawan Group - Appasamy Libya</p>

</html>
