<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rawan Group</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#071521;
    color:white;
    text-align:center;
}

/* HEADER */
header{
    padding:60px 20px;
    background:linear-gradient(135deg,#071521,#0f2538);
}

.logo{
    height:60px;
}

/* BUTTON */
.btn{
    padding:12px 20px;
    background:#00c896;
    border-radius:8px;
    text-decoration:none;
    color:white;
    display:inline-block;
    margin:10px;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#0f2538;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.lang-btn{
    margin-top:10px;
    cursor:pointer;
    background:#222;
    padding:8px 12px;
    border-radius:6px;
}
</style>
</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1 id="title">Rawan Group</h1>
<p id="desc">Medical & Ophthalmology Equipment</p>

<div>
<span class="lang-btn" onclick="setLang('en')">English</span>
<span class="lang-btn" onclick="setLang('ar')">العربية</span>
</div>

</header>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img src="148DA614-FBB5-4A0D-9E33-81453802A1AF.png">
<h3 id="p1">YAG Laser</h3>
<a class="btn" href="https://wa.me/218924173771" id="order">Order Now</a>
</div>

</div>

<script>
function setLang(lang){

if(lang === "ar"){
document.body.style.direction = "rtl";

document.getElementById("title").innerText = "روان جروب";
document.getElementById("desc").innerText = "معدات طبية وعيون";
document.getElementById("p1").innerText = "جهاز ليزر YAG";
document.getElementById("order").innerText = "اطلب الآن";

}else{
document.body.style.direction = "ltr";

document.getElementById("title").innerText = "Rawan Group";
document.getElementById("desc").innerText = "Medical & Ophthalmology Equipment";
document.getElementById("p1").innerText = "YAG Laser";
document.getElementById("order").innerText = "Order Now";
}

}
</script>

</body>
</html>
