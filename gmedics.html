<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-MEDICS</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1f2a;
  color:white;
}

h1{
  text-align:center;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  color:black;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3{
  text-align:center;
}

</style>

</head>

<body>

<h1>G-MEDICS Devices</h1>

<div class="products">

  <div class="card">
    <img src="IMG_5234.jpeg">
    <h3>Device 1</h3>
  </div>

  <div class="card">
    <img src="0D3F17F5-E62F-4BEF-A545-3F9DD995E17C.png">
    <h3>Device 2</h3>
  </div>

  <div class="card">
    <img src="39A4E4DC-ED86-4F67-A4A7-CE131D6FF3A.png">
    <h3>Device 3</h3>
  </div>

  <div class="card">
    <img src="4F0120E8-76B5-4697-B2BA-A87E57F8DD9.png">
    <h3>Device 4</h3>
  </div>

</div>

</body>
</html>
